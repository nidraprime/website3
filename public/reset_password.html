<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — NidraPrime</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/nplogodevice.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="/" class="nav-logo">
      <img src="/nplogodevice.png" alt="NidraPrime Logo" class="brand-logo">
      <span class="logo-text">Nidra<span>Prime</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/materials.html">Materials</a></li>
      <li><a href="/products.html">Products</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/customer_login.html" class="nav-cta">My Account</a></li>
    </ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-brand">
          <div class="auth-logo-text">
            Nidra<span>Prime</span>
          </div>
        </div>
        <div class="auth-subtitle">Customer Portal</div>
      </div>

      <div class="divider"></div>

      <h2 class="auth-title">Set a New Password</h2>
      <p class="auth-desc" id="formDesc">Choose a new password for your account.</p>

      <div class="auth-error" id="formError"></div>
      <div id="formSuccess" style="display:none;background:#e8f5e9;border:1px solid #c8e6c9;color:#2e7d32;border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-bottom:1rem;"></div>

      <div id="resetForm">
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            class="form-input"
            placeholder="At least 6 characters"
            autocomplete="new-password"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm New Password</label>
          <input
            type="password"
            id="confirmPassword"
            class="form-input"
            placeholder="Re-enter new password"
            autocomplete="new-password"
          >
        </div>

        <button type="button" class="btn btn-primary" id="submitBtn" style="width:100%;justify-content:center;margin-top:0.5rem;" onclick="handleSubmit()">
          Reset Password
        </button>
      </div>

      <div class="auth-hint">
        <a href="/customer_login.html">← Back to Login</a>
        &nbsp;|&nbsp;
        <a href="/forgot_password.html">Request a new link</a>
      </div>

    </div>
  </div>

  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('formDesc').textContent = '';
      document.getElementById('resetForm').style.display = 'none';
      const errorBox = document.getElementById('formError');
      errorBox.textContent   = '⚠️ This reset link is missing its token. Please request a new one.';
      errorBox.style.display = 'block';
    }

    document.getElementById('confirmPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSubmit();
    });

    async function handleSubmit() {
      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorBox        = document.getElementById('formError');
      const successBox      = document.getElementById('formSuccess');
      const btn             = document.getElementById('submitBtn');

      errorBox.style.display   = 'none';
      successBox.style.display = 'none';

      if (newPassword.length < 6) {
        errorBox.textContent   = '⚠️ Password must be at least 6 characters long.';
        errorBox.style.display = 'block';
        return;
      }
      if (newPassword !== confirmPassword) {
        errorBox.textContent   = '⚠️ Passwords do not match.';
        errorBox.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Resetting...';

      try {
        const res  = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();

        if (data.success) {
          successBox.textContent   = '✅ ' + data.message;
          successBox.style.display = 'block';
          document.getElementById('resetForm').style.display = 'none';
          setTimeout(() => { window.location.href = '/customer_login.html'; }, 2000);
        } else {
          errorBox.textContent   = '⚠️ ' + (data.message || 'Could not reset password.');
          errorBox.style.display = 'block';
        }
      } catch {
        errorBox.textContent   = '⚠️ Server error. Please try again.';
        errorBox.style.display = 'block';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>

</body>
</html>
