<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — NidraPrime</title>
  <link rel="icon" href="/nplogodevice.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="/" class="nav-logo">
      <img src="/nplogodevice.png" alt="NidraPrime Logo" class="brand-logo">
      <span class="logo-text">Nidra<span>Prime</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/materials.html">Materials</a></li>
      <li><a href="/products.html">Products</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/customer_login.html" class="nav-cta">My Account</a></li>
    </ul>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <section class="empty-state" style="padding:8rem 2rem 6rem;">
    <div class="empty-state-icon">🛏️</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:0.75rem;">Page Not Found</h1>
    <p style="margin-bottom:2rem;">The page you're looking for doesn't exist or may have moved.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="/" class="btn btn-primary">Back to Home →</a>
      <a href="/products.html" class="btn btn-outline" style="color:var(--text-dark);border-color:var(--border);">Browse Products</a>
    </div>
  </section>

  <script src="/auth-nav.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>
</body>
</html>
